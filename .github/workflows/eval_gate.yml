name: RAG Quality Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  eval-gate:
    name: Evaluate RAG Pipeline Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-models-minilm-v2

      - name: Run ingestion (rebuild indexes)
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: python scripts/ingest.py --recreate

      - name: Run evaluation gate
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          MIN_FAITHFULNESS: "0.75"
          MIN_ANSWER_RELEVANCE: "0.70"
          EVAL_SAMPLES: "5"
        run: pytest tests/test_eval_gate.py -v --tb=short

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: eval_report.json
          if-no-files-found: ignore
